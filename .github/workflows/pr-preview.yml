name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy game files to preview subfolder
        run: |
          mkdir -p preview
          cp index.html sw.js manifest.json icon-192.svg icon-512.svg preview/
          # Fix sw.js scope and asset paths for subfolder
          sed -i "s|'./|'../|g" preview/sw.js
          sed -i "s|\"./ |\"./ |g" preview/sw.js

      - name: Deploy to gh-pages/pr-N
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./preview
          destination_dir: pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const url = `https://jimmy-claw.github.io/chameleon-catch/pr-${prNum}/`;
            const body = `🦎 **Preview:** ${url}\n*(updates on every push)*`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNum
            });
            const existing = comments.data.find(c => c.body.includes('Preview:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNum, body
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
      - name: Remove preview folder
        run: |
          DIR="pr-${{ github.event.pull_request.number }}"
          if [ -d "$DIR" ]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git rm -rf "$DIR"
            git commit -m "chore: cleanup preview PR #${{ github.event.pull_request.number }}"
            git push
          fi
