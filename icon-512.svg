<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- background circle -->
  <circle cx="256" cy="256" r="256" fill="#1a4a2e"/>
  <!-- jungle ground blob -->
  <ellipse cx="256" cy="430" rx="210" ry="82" fill="#124d30"/>
  <!-- branch -->
  <rect x="20" y="316" width="320" height="42" rx="21" fill="#6b3a1f"/>
  <rect x="30" y="323" width="290" height="12" rx="6" fill="rgba(255,255,255,0.1)"/>
  <!-- chameleon body -->
  <ellipse cx="225" cy="295" rx="112" ry="58" fill="#5cb85c" stroke="#3d8b3d" stroke-width="3"/>
  <!-- belly -->
  <ellipse cx="225" cy="325" rx="80" ry="26" fill="#74c69d" opacity="0.7"/>
  <!-- back spikes -->
  <polyline points="118,254 132,232 152,254 172,228 192,252 212,222 232,248 252,218 272,244 292,214 312,238 330,234 342,254"
            fill="none" stroke="#3d8b3d" stroke-width="6" stroke-linejoin="round"/>
  <!-- legs -->
  <line x1="155" y1="340" x2="140" y2="380" stroke="#3d8b3d" stroke-width="18" stroke-linecap="round"/>
  <line x1="290" y1="340" x2="305" y2="380" stroke="#3d8b3d" stroke-width="18" stroke-linecap="round"/>
  <!-- tail -->
  <path d="M115,295 Q60,320 66,278 Q72,236 112,256" fill="none" stroke="#3d8b3d" stroke-width="20" stroke-linecap="round"/>
  <!-- neck -->
  <path d="M328,270 Q368,258 390,235" fill="#5cb85c" stroke="#3d8b3d" stroke-width="3"/>
  <!-- head -->
  <ellipse cx="372" cy="254" rx="52" ry="40" fill="#5cb85c" stroke="#3d8b3d" stroke-width="3"/>
  <!-- casque -->
  <path d="M326,238 Q348,198 392,212" fill="#4aaa4a" stroke="#3d8b3d" stroke-width="3"/>
  <!-- eye bulge -->
  <circle cx="392" cy="236" r="28" fill="#4aaa4a" stroke="#3d8b3d" stroke-width="3"/>
  <circle cx="392" cy="236" r="19" fill="white"/>
  <circle cx="397" cy="236" r="12" fill="#f4a261"/>
  <circle cx="400" cy="236" r="6"  fill="#1a1a1a"/>
  <circle cx="403" cy="230" r="2.5" fill="white"/>
  <!-- nostril -->
  <circle cx="416" cy="254" r="5" fill="#3d8b3d"/>
  <!-- mouth -->
  <path d="M392,264 Q408,272 420,270" fill="none" stroke="#3d8b3d" stroke-width="4" stroke-linecap="round"/>
  <!-- tongue -->
  <line x1="420" y1="270" x2="450" y2="210" stroke="#c1121f" stroke-width="10" stroke-linecap="round"/>
  <circle cx="452" cy="208" r="14" fill="#e63946"/>
  <circle cx="448" cy="203" r="5"  fill="#ff8fa3"/>
  <!-- fly -->
  <ellipse cx="455" cy="168" rx="14" ry="18" fill="#333"/>
  <ellipse cx="428" cy="161" rx="24" ry="14" fill="rgba(200,220,255,0.7)" stroke="#aad0ff" stroke-width="2"/>
  <ellipse cx="483" cy="161" rx="24" ry="14" fill="rgba(200,220,255,0.7)" stroke="#aad0ff" stroke-width="2"/>
  <circle cx="450" cy="152" r="10" fill="#444"/>
  <circle cx="445" cy="150" r="4" fill="#e63946"/>
  <circle cx="456" cy="150" r="4" fill="#e63946"/>
</svg>
