<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- background circle -->
  <circle cx="96" cy="96" r="96" fill="#1a4a2e"/>
  <!-- jungle ground blob -->
  <ellipse cx="96" cy="160" rx="80" ry="32" fill="#124d30"/>
  <!-- branch -->
  <rect x="10" y="118" width="120" height="16" rx="8" fill="#6b3a1f"/>
  <!-- chameleon body -->
  <ellipse cx="85" cy="110" rx="42" ry="22" fill="#5cb85c"/>
  <!-- body belly -->
  <ellipse cx="85" cy="120" rx="30" ry="10" fill="#74c69d" opacity="0.7"/>
  <!-- back spikes -->
  <polyline points="48,96 54,87 62,96 70,85 78,95 86,83 94,93 102,82 110,92 118,90 124,96"
            fill="none" stroke="#3d8b3d" stroke-width="3" stroke-linejoin="round"/>
  <!-- tail -->
  <path d="M44,110 Q20,120 24,102 Q28,84 42,94" fill="none" stroke="#3d8b3d" stroke-width="8" stroke-linecap="round"/>
  <!-- head -->
  <ellipse cx="128" cy="96" rx="20" ry="15" fill="#5cb85c" stroke="#3d8b3d" stroke-width="1.5"/>
  <!-- casque -->
  <path d="M110,89 Q120,76 136,82" fill="#4aaa4a" stroke="#3d8b3d" stroke-width="1.5"/>
  <!-- eye -->
  <circle cx="136" cy="90" r="11" fill="#4aaa4a" stroke="#3d8b3d" stroke-width="1.5"/>
  <circle cx="136" cy="90" r="7"  fill="white"/>
  <circle cx="138" cy="90" r="4"  fill="#f4a261"/>
  <circle cx="139" cy="90" r="2"  fill="#1a1a1a"/>
  <circle cx="140" cy="88" r="1"  fill="white"/>
  <!-- mouth / tongue hint -->
  <path d="M138,100 Q145,104 150,103" fill="none" stroke="#3d8b3d" stroke-width="2" stroke-linecap="round"/>
  <circle cx="154" cy="103" r="5" fill="#e63946"/>
  <!-- fly -->
  <ellipse cx="155" cy="62" rx="6" ry="8" fill="#333"/>
  <ellipse cx="143" cy="59" rx="10" ry="6" fill="rgba(200,220,255,0.7)" stroke="#aad0ff" stroke-width="1"/>
  <ellipse cx="167" cy="59" rx="10" ry="6" fill="rgba(200,220,255,0.7)" stroke="#aad0ff" stroke-width="1"/>
  <circle cx="152" cy="56" r="4" fill="#444"/>
  <circle cx="150" cy="55" r="1.5" fill="#e63946"/>
  <circle cx="154" cy="55" r="1.5" fill="#e63946"/>
</svg>
